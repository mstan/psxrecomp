# PSXRecomp v2 — Key Configuration
# Edit values to remap buttons. Restart the game after changes.
#
# Key names:
#   Letters:    A through Z
#   Numbers:    0 through 9
#   D-Pad:      UP, DOWN, LEFT, RIGHT
#   Special:    ENTER, ESCAPE, SPACE, TAB, BACKSPACE
#               APOSTROPHE (')  SEMICOLON (;)  COMMA (,)  PERIOD (.)
#               LSHIFT, RSHIFT, LCTRL, RCTRL, LALT, RALT
#
# PS1 button reference:
#   D-Pad:    UP DOWN LEFT RIGHT
#   Face:     CROSS (X)  SQUARE  TRIANGLE  CIRCLE
#   Shoulder: L1  L2  R1  R2
#   Meta:     START  SELECT

[Audio]
# Volume: 0.0 (silent) to 1.0 (full). Default 0.5 (recommended for headphones).
VOLUME = 0.5

[Buttons]
UP       = UP
DOWN     = DOWN
LEFT     = LEFT
RIGHT    = RIGHT
CROSS    = S
SQUARE   = A
TRIANGLE = W
CIRCLE   = D
START    = ENTER
SELECT   = APOSTROPHE
L1       = 1
L2       = 2
R1       = 0
R2       = 9
